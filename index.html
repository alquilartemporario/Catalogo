<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Departamentos</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
html, body {
    margin:0;
    padding:0;
    width:100%;
    overflow-x:hidden;
    box-sizing:border-box;
}
body{
    font-family: 'Arial', sans-serif;
    background:#0f172a;
    color:white;
    padding:10px 0;
    text-align:center;
}
h1,h2{
    margin:0 0 15px 0;
    font-weight:bold;
    text-align:center;
}
h1{font-size:2.5em;}
h2{font-size:2em; margin-top:30px;}

#filtroAmbientes{
    width:95%;
    max-width:800px;
    padding:16px;
    margin:10px auto 20px auto;
    display:block;
    border-radius:20px;
    border:none;
    background:#1e293b;
    color:white;
    font-size:1.3em;
}

.grid{
    display:flex;
    flex-direction:column;
    gap:25px;
    width:100%;
    align-items:center;
}

.card{
    background:#1e293b;
    border-radius:25px;
    text-align:center;
    box-sizing:border-box;
    padding:20px;
    transition: transform 0.3s, box-shadow 0.3s;
    width:95%;
    max-width:800px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}
.card:hover{
    transform: translateY(-2px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.5);
}
.card img{
    width:100%;
    height:auto;
    object-fit:cover;
    border-radius:20px;
    cursor:pointer;
    margin-bottom:15px;
}
.card h3, .card p.barrio{
    margin:5px 0;
    font-size:1.6em;
}
.card p.barrio{
    font-weight:bold;
    letter-spacing:1px;
    text-transform:uppercase;
    font-family: 'Georgia', serif;
}
.card .info{
    margin:15px 0;
    font-size:1.2em;
    display:flex;
    justify-content:space-around;
    flex-wrap:wrap;
    text-align:center;
}
.card .info div{
    flex:1 1 30%;
    margin:5px 0;
    font-family: 'Georgia', serif;
    font-weight:bold;
    font-size:1.2em;
}

.card .btn-row{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:15px;
}

.btn{
    padding:14px 20px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:bold;
    display:inline-flex;
    align-items:center;
    gap:8px;
    transition: 0.3s;
    font-size:1.2em;
}
.btn-whatsapp{background:#25D366;color:white;}
.btn-maps{background:#3b82f6;color:white;}
.btn-fotos{background:#f59e0b;color:white;}
.btn-consulta{background:#6366f1;color:white;}

/* FORMULARIO */
form{
    margin-top:30px;
    background:#1e293b;
    padding:30px 20px;
    border-radius:25px;
    width:95%;
    max-width:500px;
    box-sizing:border-box;
    text-align:center;
    margin-left:auto;
    margin-right:auto;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}
form label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    font-size:1.5em;
}
form input, form select{
    width:100%;
    padding:16px;
    margin-bottom:20px;
    border-radius:14px;
    border:none;
    font-size:1.4em;
    text-align:center;
}

/* Modal Carrusel */
.modal{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:1000;
    overflow:hidden;
    flex-direction:column;
}
.modal .close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:35px;
    color:white;
    cursor:pointer;
    z-index:1001;
}
.modal .prev, .modal .next{
    position:absolute;
    top:50%;
    font-size:45px;
    color:white;
    cursor:pointer;
    user-select:none;
    transform: translateY(-50%);
    z-index:1001;
}
.modal .prev{left:15px;}
.modal .next{right:15px;}
.modal img{
    display:block;
    max-width:90%;
    max-height:80%;
    object-fit:contain;
    margin:auto;
    border-radius:10px;
}

@media(max-width:768px){
    body{padding:5px;}
    h1{font-size:2em;}
    h2{font-size:1.8em;}
    #filtroAmbientes{font-size:1.2em;padding:12px;}
    .card h3, .card p.barrio{font-size:1.4em;}
    .card .info{font-size:1.1em;}
    .btn{font-size:1.1em;padding:12px 16px;}
    form label{font-size:1.3em;}
    form input, form select{font-size:1.2em;padding:14px;}
}
</style>
</head>
<body>

<h1>Departamentos</h1>
<label>Filtrar por ambientes:</label>
<select id="filtroAmbientes">
    <option value="">Todos</option>
</select>

<div id="contenedor" class="grid"></div>

<h2>Formulario de Consulta</h2>
<form id="consultaForm">
    <input type="hidden" id="direccionForm">
    <input type="hidden" id="vendedorForm">

    <label>Nombre:</label>
    <input type="text" id="nombreForm" placeholder="Tu nombre" required>

    <label>Fecha de ingreso:</label>
    <input type="date" id="fechaForm" required>

    <label>Tiempo a alquilar (meses):</label>
    <input type="number" id="tiempoForm" min="1" required>

    <label>Cantidad de personas:</label>
    <input type="number" id="personasForm" min="1" required>

    <label>¿Tienen mascotas?</label>
    <select id="mascotasForm" required>
        <option value="No">No</option>
        <option value="Sí">Sí</option>
    </select>

    <button type="submit" class="btn btn-whatsapp">💬 Enviar WhatsApp</button>
</form>

<!-- Modal Carrusel -->
<div id="modal" class="modal">
    <span class="close" onclick="cerrarModal()">&times;</span>
    <span class="prev" onclick="cambiarFoto(-1)">&#10094;</span>
    <span class="next" onclick="cambiarFoto(1)">&#10095;</span>
    <div style="display:flex; justify-content:center; align-items:center; height:100%;">
        <img id="modalImg" src="">
    </div>
</div>

<script>
const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2E7ECUfY-ps4Ok0_1TJxTR1UPoYl-_ZYkGNlvhk9eZWHBslhsWtoCiTaPfCjQJ38kojq9pJBeoGep/pub?output=csv";
let departamentos = [];
let currentFotos = [];
let currentIndex = 0;

Papa.parse(csvURL,{
    download:true,
    header:true,
    complete:function(results){
        departamentos = results.data.filter(row => row["Dirección"]);
        llenarFiltro();
        mostrarDepartamentos(departamentos);
    }
});

function llenarFiltro(){
    const select = document.getElementById("filtroAmbientes");
    let ambientesSet = new Set(departamentos.map(d=>d["Ambientes"]).filter(Boolean));
    ambientesSet.forEach(a=>{
        let option = document.createElement("option");
        option.value = a;
        option.textContent = a + " ambientes";
        select.appendChild(option);
    });
    select.addEventListener("change",()=>{
        let filtrados = departamentos.filter(d => !select.value || d["Ambientes"] === select.value);
        mostrarDepartamentos(filtrados);
    });
}

function mostrarDepartamentos(lista){
    const contenedor=document.getElementById("contenedor");
    contenedor.innerHTML="";
    lista.forEach((row,index)=>{
        let fotosLinks = [];
        if(row["Fotos"]){
            fotosLinks = row["Fotos"].split(",").map(f=>f.trim()).map(link=>{
                let id = link.match(/[-\w]{25,}/);
                return id ? "https://lh3.googleusercontent.com/d/"+id[0] : null;
            }).filter(Boolean);
        }
        let primera = fotosLinks[0] || "";

        let card = document.createElement("div");
        card.className="card";
        card.innerHTML=`
            <p class="barrio">${row["Barrio"] || ""}</p>
            <h3>${row["Dirección"]}</h3>
            <div class="info">
                <div>Valor: ${row["Valor"] || "-"}</div>
                <div>Incluye: ${row["Incluye"] || "-"}</div>
                <div>${row["Ambientes"]} ambientes</div>
            </div>
            <img id="foto${index}" src="${primera}" onclick="abrirModal(${index})">
            <div class="btn-row">
                <button class="btn btn-fotos" onclick="abrirModal(${index})">📸 Ver Fotos</button>
                <button class="btn btn-consulta" onclick="seleccionarDepartamento('${row['Dirección']}','${row['Vendedor']}')">💼 Consulta</button>
                <button class="btn btn-maps" onclick="verEnMaps('${row['Dirección']}')">🗺️ Maps</button>
            </div>
        `;
        card.fotos = fotosLinks;
        card.current = 0;
        contenedor.appendChild(card);
    });
}

function seleccionarDepartamento(direccion, vendedor){
    document.getElementById("direccionForm").value = direccion;
    document.getElementById("vendedorForm").value = vendedor;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function verEnMaps(direccion){
    let url = `https://www.google.com/maps/search/${encodeURIComponent(direccion + ', Ciudad Autónoma de Buenos Aires')}`;
    window.open(url, "_blank");
}

// Modal carrusel
function abrirModal(index){
    currentFotos = departamentos[index].Fotos ? departamentos[index].Fotos.split(",").map(f=>f.trim()).map(link=>{
        let id = link.match(/[-\w]{25,}/);
        return id ? "https://lh3.googleusercontent.com/d/"+id[0] : null;
    }).filter(Boolean) : [];
    if(currentFotos.length===0) return;
    currentIndex = 0;
    document.getElementById("modalImg").src = currentFotos[currentIndex];
    document.getElementById("modal").style.display = "flex";
}

function cerrarModal(){
    document.getElementById("modal").style.display = "none";
}

function cambiarFoto(delta){
    if(!currentFotos.length) return;
    currentIndex = (currentIndex + delta + currentFotos.length) % currentFotos.length;
    document.getElementById("modalImg").src = currentFotos[currentIndex];
}

// WhatsApp con nombre
document.getElementById("consultaForm").addEventListener("submit", function(e){
    e.preventDefault();
    const nombre = document.getElementById("nombreForm").value;
    const direccion = document.getElementById("direccionForm").value;
    let vendedor = document.getElementById("vendedorForm").value;
    if(!vendedor) { alert("No hay vendedor asignado"); return; }
    if(vendedor[0] !== '+') vendedor = '+' + vendedor;
    const fecha = document.getElementById("fechaForm").value;
    const tiempo = document.getElementById("tiempoForm").value;
    const personas = document.getElementById("personasForm").value;
    const mascotas = document.getElementById("mascotasForm").value;

    let mensaje = `Hola! Mi nombre es ${nombre}.\nEstoy interesado en el departamento "${direccion}".\nFecha de ingreso: ${fecha}\nTiempo de alquiler: ${tiempo} meses\nPersonas: ${personas}\nMascotas: ${mascotas}`;
    window.open(`https://wa.me/${vendedor.replace(/\D/g,'')}?text=${encodeURIComponent(mensaje)}`, "_blank");
});
</script>
</body>
</html>
