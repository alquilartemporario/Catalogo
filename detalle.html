<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Departamento</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

.container{max-width:900px;margin:auto;padding-bottom:120px;}

.hero{text-align:center;padding:40px;}

.barrioGrande{
font-size:2.5em;
font-weight:bold;
color:#38bdf8;
}

.precio{color:#facc15;font-size:2em;margin-top:10px;}

.galeria{display:flex;overflow-x:auto;gap:12px;padding:20px;}
.galeria img{height:400px;border-radius:12px;cursor:pointer;}

.box{
background:#1e293b;
padding:20px;
border-radius:14px;
margin:12px;
font-size:1.6em;
}

.direccionGrande{font-size:2.5em;}
.ambientesGrande{font-size:2.5em;color:#38bdf8;}

.story{
text-align:center;
font-size:2em;
padding:20px;
}

.pasos{
font-size:2em;
text-align:center;
padding:20px;
}

.cta{
position:fixed;
bottom:0;
width:100%;
background:#25D366;
text-align:center;
padding:22px;
font-size:1.4em;
cursor:pointer;
}

.modal{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.modalContent{
background:#1e293b;
padding:30px;
border-radius:12px;
width:90%;
max-width:500px;
position:relative;
}

.closeBtn{
position:absolute;
top:10px;
right:15px;
font-size:2em;
color:red;
cursor:pointer;
}

.carousel{
display:flex;
overflow-x:auto;
gap:15px;
}

.carousel img{
height:80vh;
border-radius:12px;
}

.btnWhite{background:white;color:black;padding:15px;border-radius:8px;}
.btnGreen{background:#22c55e;color:white;padding:15px;border-radius:8px;}

</style>
</head>

<body>

<div class="container">

<div class="hero">
<div id="barrio" class="barrioGrande"></div>
<div id="titulo"></div>
<div id="precio" class="precio"></div>
</div>

<div class="story">
Si buscas mudarte de forma simple este departamento es ideal para vos
</div>

<div class="galeria" id="galeria"></div>

<div class="box">
<div id="direccion" class="direccionGrande"></div>
</div>

<div class="box">
<div id="ambientes" class="ambientesGrande"></div>
</div>

<div class="box">
<div id="incluye"></div>
</div>

<div class="box">
<iframe id="mapa" style="width:100%;aspect-ratio:1/1;border:none"></iframe>
</div>

<div class="box">
<div id="total"></div>
</div>

<div class="pasos">
1. Consultás<br>
2. Validamos tu perfil<br>
3. Reservás sin vueltas
</div>

</div>

<div class="cta" onclick="iniciarProceso()">
💬 Consultar por WhatsApp
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modalContent" id="modalContent"></div>
</div>

<!-- VISOR -->
<div class="modal" id="visor">
<div class="carousel" id="carousel"></div>
<span class="closeBtn" onclick="cerrarVisor()">✖</span>
</div>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2E7ECUfY-ps4Ok0_1TJxTR1UPoYl-_ZYkGNlvhk9eZWHBslhsWtoCiTaPfCjQJ38kojq9pJBeoGep/pub?output=csv"

let depto=null
let fotosGlobal=[]

const params=new URLSearchParams(window.location.search)
const index=params.get("i")

Papa.parse(csvURL,{
download:true,
header:true,
complete:function(results){
let data=results.data.filter(r=>r["Dirección"])
depto=data[index]
cargar()
}
})

function cargar(){

let fotos=depto["Fotos"].split(",").map(f=>{
let id=f.match(/[-\w]{25,}/)
return "https://lh3.googleusercontent.com/d/"+id[0]
})

fotosGlobal=fotos

document.getElementById("barrio").innerText=depto["Barrio"]
document.getElementById("titulo").innerText=depto["Ambientes"]+" ambientes"
document.getElementById("precio").innerText=depto["Valor"]+" / mes"
document.getElementById("direccion").innerText=depto["Dirección"]
document.getElementById("ambientes").innerText=depto["Ambientes"]+" ambientes"
document.getElementById("incluye").innerText=depto["Incluye"]

let valor=parseFloat(depto["Valor"])
let total=valor*3

document.getElementById("total").innerHTML="Total: USD "+total

document.getElementById("mapa").src=
"https://maps.google.com/maps?q="+encodeURIComponent(depto["Dirección"]+", Buenos Aires")+"&output=embed"

let g=document.getElementById("galeria")
g.innerHTML=""

fotos.forEach((f,i)=>{
let img=document.createElement("img")
img.src=f
img.onclick=()=>abrirVisor(i)
g.appendChild(img)
})

}

// ===== CARRUSEL =====

function abrirVisor(index){

let c=document.getElementById("carousel")
c.innerHTML=""

fotosGlobal.forEach(f=>{
let img=document.createElement("img")
img.src=f
c.appendChild(img)
})

document.getElementById("visor").style.display="flex"
c.scrollLeft=index * window.innerWidth
}

function cerrarVisor(){
document.getElementById("visor").style.display="none"
}

// ===== WHATSAPP =====

function iniciarProceso(){
enviarWhatsApp()
}

function enviarWhatsApp(){

let texto=`Hola! Quiero más info sobre este departamento:

📍 ${depto["Dirección"]} - ${depto["Barrio"]}
`

window.open("https://wa.me/5491168686694?text="+encodeURIComponent(texto))

}

</script>

</body>
</html>
