<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Departamento</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
font-size:20px;
}

.container{max-width:900px;margin:auto;padding-bottom:120px;}

.hero{text-align:center;padding:40px;}

h1{font-size:2.2em;}

.precio{color:#facc15;font-size:2.2em;margin-top:10px;}

.galeria{display:flex;overflow-x:auto;gap:12px;padding:20px;}
.galeria img{height:220px;border-radius:12px;}

.box{
background:#1e293b;
padding:20px;
border-radius:14px;
margin:12px;
}

h2{font-size:1.6em;}

.ambientesGrande{
font-size:2.5em;
font-weight:bold;
color:#38bdf8;
}

.cta{
position:fixed;
bottom:0;
width:100%;
background:#25D366;
text-align:center;
padding:22px;
font-size:1.4em;
cursor:pointer;
}

.modal{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.modalContent{
background:#1e293b;
padding:25px;
border-radius:12px;
width:90%;
max-width:400px;
text-align:center;
}

input{
width:90%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
font-size:1em;
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:1em;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1 id="titulo"></h1>
<div class="precio" id="precio"></div>
</div>

<div class="galeria" id="galeria"></div>

<div class="box">
<h2>Tu espacio ideal en Buenos Aires</h2>
<div id="direccion"></div>
</div>

<div class="box">
<h2>Ambientes</h2>
<div id="ambientes" class="ambientesGrande"></div>
</div>

<div class="box">
<h2>Lo que incluye</h2>
<div id="incluye"></div>
</div>

<div class="box">
<h2>Ubicación estratégica</h2>
<iframe id="mapa" style="width:100%;height:220px;border:none;margin-top:10px"></iframe>
</div>

<div class="box">
<h2>Estimación total</h2>
<div id="total"></div>
</div>

</div>

<div class="cta" onclick="iniciarProceso()">
💬 Consultar por WhatsApp
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modalContent" id="modalContent"></div>
</div>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2E7ECUfY-ps4Ok0_1TJxTR1UPoYl-_ZYkGNlvhk9eZWHBslhsWtoCiTaPfCjQJ38kojq9pJBeoGep/pub?output=csv"

let depto=null
let formData={}

const params=new URLSearchParams(window.location.search)
const index=params.get("i")

Papa.parse(csvURL,{
download:true,
header:true,
complete:function(results){

let data=results.data.filter(r=>r["Dirección"])
depto=data[index]

cargar()

}
})

function cargar(){

let fotos=depto["Fotos"].split(",").map(f=>{
let id=f.match(/[-\w]{25,}/)
return "https://lh3.googleusercontent.com/d/"+id[0]
})

document.getElementById("titulo").innerText=
depto["Barrio"]+" • "+depto["Ambientes"]+" ambientes"

document.getElementById("precio").innerText=
depto["Valor"]+" / mes"

document.getElementById("direccion").innerText=
depto["Dirección"]

document.getElementById("ambientes").innerText=
depto["Ambientes"]+" ambientes"

document.getElementById("incluye").innerText=
depto["Incluye"]

let valor=parseFloat(depto["Valor"])
document.getElementById("total").innerText="USD "+(valor*3)

document.getElementById("mapa").src=
"https://maps.google.com/maps?q="+encodeURIComponent(depto["Dirección"]+", Buenos Aires")+"&output=embed"

let g=document.getElementById("galeria")

fotos.forEach(f=>{
let img=document.createElement("img")
img.src=f
g.appendChild(img)
})

}

// ===== FLUJO =====

function iniciarProceso(){
mostrarRequisitos()
}

function mostrarRequisitos(){
let m=document.getElementById("modal")
let c=document.getElementById("modalContent")

c.innerHTML=`
<h2>Antes de continuar</h2>
<p>✔ Contrato mínimo 3 meses<br>
✔ Depósito en garantía<br>
✔ Sin fiestas ni ruidos molestos</p>
<button onclick="pasoNombre()">Aceptar y continuar</button>
`

m.style.display="flex"
}

function pasoNombre(){
setPregunta("Nombre completo", "nombre")
}

function pasoPersonas(){
setPregunta("¿Cuántas personas?", "personas")
}

function pasoIngreso(){
setPregunta("Fecha de ingreso", "ingreso")
}

function pasoTiempo(){
setPregunta("¿Por cuánto tiempo?", "tiempo")
}

function pasoMascotas(){
setPregunta("¿Tenés mascotas?", "mascotas", true)
}

function setPregunta(texto, campo, esFinal=false){

let c=document.getElementById("modalContent")

c.innerHTML=`
<h2>${texto}</h2>
<input id="input">
<button onclick="guardar('${campo}', ${esFinal})">Continuar</button>
`
}

function guardar(campo, esFinal){

let val=document.getElementById("input").value
formData[campo]=val

if(campo=="nombre") pasoPersonas()
else if(campo=="personas") pasoIngreso()
else if(campo=="ingreso") pasoTiempo()
else if(campo=="tiempo") pasoMascotas()
else if(campo=="mascotas") enviarWhatsApp()

}

function enviarWhatsApp(){

let texto=`Hola! Quiero este departamento:

📍 ${depto["Dirección"]} - ${depto["Barrio"]}

👤 Nombre: ${formData.nombre}
👥 Personas: ${formData.personas}
📅 Ingreso: ${formData.ingreso}
⏳ Tiempo: ${formData.tiempo}
🐶 Mascotas: ${formData.mascotas}
`

window.open("https://wa.me/5491168686694?text="+encodeURIComponent(texto))

document.getElementById("modal").style.display="none"

}

</script>

</body>
</html>
